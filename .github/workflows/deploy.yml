name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build
        env:
          VITE_OPENROUTER_KEY: ${{ secrets.VITE_OPENROUTER_KEY }}

      - name: Deploy to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 69.62.108.82
          username: automation
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'app/dist/'
          target: /opt/reading-coach/
          strip_components: 2
          overwrite: true
          rm: true

      - name: Deploy nginx cache config + reload
        uses: appleboy/ssh-action@v1
        with:
          host: 69.62.108.82
          username: automation
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Files deployed ==="
            ls -la /opt/reading-coach/
            ls -la /opt/reading-coach/assets/ 2>/dev/null | head -5
            
            echo "=== Verify key files ==="
            test -f /opt/reading-coach/sw.js && echo "sw.js OK" || echo "sw.js MISSING"
            test -f /opt/reading-coach/manifest.json && echo "manifest.json OK" || echo "manifest.json MISSING"
            test -f /opt/reading-coach/index.html && echo "index.html OK" || echo "index.html MISSING"
            
            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx || echo "nginx reload skipped"
