# Cache headers for Reading Coach PWA
# Include this in the server block: include /opt/reading-coach/nginx-cache-headers.conf;

# HTML — NEVER cache (always revalidate)
location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
}

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# Service Worker — NEVER cache (browser must always check for updates)
location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header Service-Worker-Allowed "/" always;
}

# Manifest — short cache (5 min), revalidate
location = /manifest.json {
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
}

# Hashed assets (Vite JS/CSS with content hash) — immutable, cache forever
location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Icons and images — cache 1 day
location ~* \.(png|jpg|jpeg|webp|svg|ico)$ {
    add_header Cache-Control "public, max-age=86400" always;
}
